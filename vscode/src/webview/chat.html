<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evocation</title>
<style>
  :root {
    --bg: #1e1e1e; --fg: #d4d4d4; --accent: #007acc;
    --muted: #6a6a6a; --surface: #252526; --border: #3e3e3e;
    --user-bubble: #264f78; --dog-bubble: #333333;
    --error: #f44747; --warn: #cca700;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px; height: 100vh;
    display: flex; flex-direction: column; overflow: hidden;
  }

  /* ═══════════ Status Bar ═══════════ */
  .status-bar {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 16px; background: var(--surface);
    border-bottom: 1px solid var(--border);
    min-height: 40px; flex-shrink: 0;
  }
  .mascot-svg { width: 24px; height: 24px; flex-shrink: 0; }
  .mascot-svg .core { fill: var(--accent); stroke: var(--accent); stroke-width: 1; }
  .mascot-svg .ring { fill: none; stroke: var(--accent); stroke-width: 2; opacity: 0.6; }

  /* State-driven SVG animations */
  .mascot-svg.s-idle .ring { animation: evo-pulse-ring 3s ease-in-out infinite; }
  .mascot-svg.s-thinking .core { animation: evo-think 0.8s ease-in-out infinite alternate; }
  .mascot-svg.s-sniffing .ring { animation: evo-scan 0.4s ease-in-out infinite alternate; }
  .mascot-svg.s-running .core { animation: evo-spin 0.3s linear infinite; }
  .mascot-svg.s-success .core { fill: var(--accent); animation: evo-pop 0.4s ease-out; r: 5; }
  .mascot-svg.s-error .core { fill: var(--error); animation: evo-shake 0.2s ease-in-out 3; }
  .mascot-svg.s-sleeping { opacity: 0.35; }

  @keyframes evo-pulse-ring { 0%,100%{ opacity:0.3; r:6; stroke-width:1; } 50%{ opacity:0.8; r:8; stroke-width:2; } }
  @keyframes evo-think { 0%{ r:3.5; } 100%{ r:5; } }
  @keyframes evo-scan { 0%{ transform:rotate(-8deg); } 100%{ transform:rotate(8deg); } }
  @keyframes evo-spin { 0%{ transform:rotate(0deg); } 100%{ transform:rotate(360deg); } }
  @keyframes evo-pop { 0%{ transform:scale(1); } 50%{ transform:scale(1.4); } 100%{ transform:scale(1); } }
  @keyframes evo-shake { 0%,100%{ transform:translateX(0); } 25%{ transform:translateX(-4px); } 75%{ transform:translateX(4px); } }

  .status-label { font-size: 13px; font-weight: 500; }
  .status-detail { font-size: 11px; color: var(--muted); }

  /* ═══════════ Conversation ═══════════ */
  .conversation {
    flex: 1; overflow-y: auto; padding: 16px 20px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .message {
    max-width: 75%; padding: 10px 14px; border-radius: 12px;
    line-height: 1.55; word-break: break-word;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
  .message.user { background:var(--user-bubble); align-self:flex-end; border-bottom-right-radius:4px; }
  .message.assistant { background:var(--dog-bubble); align-self:flex-start; border-bottom-left-radius:4px; }
  .message pre { background:#1a1a1a; border-radius:6px; padding:10px; margin:6px 0; overflow-x:auto; font-family:'Cascadia Code',monospace; font-size:12px; }
  .message code { font-family:'Cascadia Code',monospace; font-size:12px; background:rgba(255,255,255,0.1); padding:1px 4px; border-radius:3px; }
  .message pre code { background:none; padding:0; }
  .streaming { opacity:0.85; }

  /* ═══════════ Input ═══════════ */
  .input-area {
    border-top:1px solid var(--border); padding:12px 20px;
    display:flex; gap:8px; background:var(--bg); flex-shrink:0;
  }
  .input-area textarea {
    flex:1; background:var(--surface); border:1px solid var(--border);
    color:var(--fg); padding:10px 14px; border-radius:8px;
    font-family:inherit; font-size:13px; resize:none; outline:none;
    min-height:42px; max-height:200px; line-height:1.4;
  }
  .input-area textarea:focus { border-color:var(--accent); }
  .input-area textarea::placeholder { color:var(--muted); }
  .input-area button { background:var(--accent); color:white; border:none; padding:8px 20px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; flex-shrink:0; }
  .input-area button:hover { opacity:0.85; }
  .input-area button:disabled { opacity:0.4; cursor:not-allowed; }

  /* ═══════════ Setup ═══════════ */
  .welcome { text-align:center; padding:60px 20px; color:var(--muted); flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .welcome h2 { font-size:22px; margin-bottom:8px; color:var(--fg); }
  .setup-form { display:flex; flex-direction:column; gap:10px; max-width:400px; width:100%; margin:20px auto; }
  .setup-form input { background:var(--surface); border:1px solid var(--border); color:var(--fg); padding:8px 12px; border-radius:6px; font-size:13px; outline:none; }
  .setup-form input:focus { border-color:var(--accent); }
  .setup-form button { background:var(--accent); color:white; border:none; padding:8px 16px; border-radius:6px; font-size:13px; font-weight:600; cursor:pointer; }
  .health-check { max-width:400px; margin:12px auto; padding:12px; background:var(--surface); border-radius:8px; font-size:12px; line-height:2; text-align:left; }
  .setup-hint { margin-top:16px; font-size:12px; color:var(--warn); }
</style>
</head>
<body>

<!-- ═══════════ Status Bar ═══════════ -->
<div class="status-bar" id="statusBar">
  <svg class="mascot-svg s-idle" id="mascot" viewBox="0 0 16 16" width="24" height="24">
    <circle class="ring" cx="8" cy="8" r="7" />
    <circle class="core" cx="8" cy="8" r="4" />
  </svg>
  <div style="flex:1">
    <div class="status-label" id="statusLabel">Ready</div>
    <div class="status-detail" id="statusDetail"></div>
  </div>
  <span id="settingsBtn" style="cursor:pointer;font-size:16px;padding:4px 8px;opacity:0.6" title="Change API key">⚙</span>
</div>

<div class="conversation" id="conversation"></div>

<div class="input-area">
  <textarea id="userInput" placeholder="Message Evocation… (Enter to send)" rows="1"></textarea>
  <button id="sendBtn">Send</button>
</div>

<script>
(function(){
  const vscode = acquireVsCodeApi();
  const conv = document.getElementById("conversation");
  const userInput = document.getElementById("userInput");
  const sendBtn = document.getElementById("sendBtn");
  const mascot = document.getElementById("mascot");
  const statusLabel = document.getElementById("statusLabel");
  const statusDetail = document.getElementById("statusDetail");

  let streamingEl = null, streamingText = "";
  let currentState = "idle";

  // ═══════════ SVG State Switcher ═══════════
  function setStatus(state, label, detail) {
    if (currentState !== state) {
      mascot.className = "mascot-svg s-" + state;
      currentState = state;
    }
    statusLabel.textContent = label || "Ready";
    statusDetail.textContent = detail || "";
  }

  // ═══════════ Helpers ═══════════
  function esc(s) { const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }
  function md(t){t=t.replace(/```(\w*)\n([\s\S]*?)```/g,(_,l,c)=>"<pre><code>"+esc(c.trim())+"</code></pre>");t=t.replace(/`([^`]+)`/g,"<code>$1</code>");t=t.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>");t=t.replace(/\*([^*]+)\*/g,"<em>$1</em>");return t;}
  function scroll(){conv.scrollTop=conv.scrollHeight;}
  function addMsg(role,content){if(!content)return;const el=document.createElement("div");el.className="message "+role;if(role==="user")el.textContent=content;else el.innerHTML=md(esc(content));conv.appendChild(el);scroll();}
  function startStream(){if(streamingEl)conv.removeChild(streamingEl);streamingEl=document.createElement("div");streamingEl.className="message assistant streaming";conv.appendChild(streamingEl);streamingText="";}
  function appendToken(t){if(!streamingEl)startStream();streamingText+=t;streamingEl.innerHTML=md(esc(streamingText));scroll();}
  function finishStream(){if(streamingEl){streamingEl.classList.remove("streaming");streamingEl=null;streamingText="";}}
  function sendMsg(){const t=userInput.value.trim();if(!t)return;addMsg("user",t);userInput.value="";userInput.style.height="auto";setStatus("thinking","Thinking…");vscode.postMessage({type:"chat",text:t});}
  sendBtn.addEventListener("click",sendMsg);
  userInput.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg();}});
  userInput.addEventListener("input",()=>{userInput.style.height="auto";userInput.style.height=Math.min(userInput.scrollHeight,200)+"px";});
  document.getElementById("settingsBtn").addEventListener("click",()=>vscode.postMessage({type:"showSetup"}));

  // ═══════════ Messages ═══════════
  window.addEventListener("message",e=>{
    const m=e.data;
    switch(m.type){
      case "state":(function(s){
        if(s==="RetrievingKnowledge")setStatus("sniffing","Fetching memories…",s.detail);
        else if(s==="Thinking")setStatus("thinking","Thinking…",s.detail);
        else if(s==="RunningTools")setStatus("running","Running tools…",s.detail);
        else if(s==="Success"){setStatus("success","Done");setTimeout(()=>setStatus("idle","Ready"),1000);}
        else if(s==="Error"){setStatus("error","Error",s.detail);setTimeout(()=>setStatus("idle","Ready"),2000);}
        else if(s==="Ready")setStatus("idle","Ready");
      })(m.state);break;
      case "status":(function(t){
        if(t.includes("found")||t.includes("matched")||t.includes("learned"))setStatus("sniffing",t);
      })(m.text.toLowerCase());break;
      case "token":appendToken(m.token);break;
      case "response":finishStream();addMsg("assistant",m.content);if(m.content)setStatus("success","Done");setTimeout(()=>setStatus("idle","Ready"),1000);break;
      case "error":finishStream();const err=document.createElement("div");err.className="message assistant";err.style.color="#f44747";err.textContent="❌ "+m.text;conv.appendChild(err);setStatus("error","Error");setTimeout(()=>setStatus("idle","Ready"),1000);break;
      case "ready":setStatus("idle","Ready");break;
      case "setup":showSetup();break;
      case "health":showHealth(m);break;
      case "setup_error":showSetupError(m.text);break;
    }
  });

  async function showSetup(){
    const localModels = [
      { name: "phi4-mini", desc: "Microsoft 3.8B, fast" },
      { name: "llama3.2", desc: "Meta 3.2B, lightweight" },
      { name: "qwen2.5:3b", desc: "Alibaba 3B, multilingual" },
      { name: "gemma3:4b", desc: "Google 4B, compact" },
      { name: "mistral", desc: "Mistral 7B, general-purpose" },
      { name: "deepseek-r1:7b", desc: "DeepSeek 7B, reasoning" },
      { name: "codellama:7b", desc: "Meta 7B, code-focused" },
      { name: "phi4", desc: "Microsoft 14B, full-size" },
    ];
    const cloudModels = [
      { name: "deepseek/deepseek-chat", desc: "DeepSeek V3" },
      { name: "deepseek/deepseek-reasoner", desc: "DeepSeek R1" },
      { name: "openai/gpt-4o", desc: "OpenAI GPT-4o" },
      { name: "openai/gpt-4o-mini", desc: "OpenAI, cheap" },
      { name: "anthropic/claude-sonnet-4-20250514", desc: "Claude Sonnet 4" },
      { name: "anthropic/claude-haiku-4-20250514", desc: "Claude Haiku" },
      { name: "moonshot/kimi-k2-0905", desc: "Kimi K2 — Moonshot AI" },
      { name: "openrouter/deepseek/deepseek-chat", desc: "OpenRouter → DeepSeek" },
      { name: "openrouter/anthropic/claude-sonnet-4", desc: "OpenRouter → Claude" },
      { name: "openrouter/openai/gpt-4o", desc: "OpenRouter → GPT-4o" },
      { name: "openrouter/google/gemini-2.5-pro", desc: "OpenRouter → Gemini" },
      { name: "openrouter/moonshotai/kimi-k2", desc: "OpenRouter → Kimi" },
    ];
    let installed = [];
    try {
      const resp = await fetch('http://localhost:11434/api/tags');
      installed = ((await resp.json()).models || []).map(m => m.name.replace(/:latest$/, ''));
    } catch(e) {}

    let localOpts = '';
    for (const p of localModels) {
      const ok = installed.includes(p.name);
      localOpts += `<option value="${p.name}">${ok ? "✅" : "⬇"} ${p.name} — ${p.desc}${ok ? "" : " (ollama pull)"}</option>`;
    }
    // Add any extra installed local models not in our list
    for (const n of installed) {
      if (!localModels.find(p => p.name === n)) {
        localOpts += `<option value="${n}">✅ ${n} — installed</option>`;
      }
    }

    let cloudOpts = '';
    for (const c of cloudModels) {
      cloudOpts += `<option value="${c.name}">☁ ${c.name} — ${c.desc}</option>`;
    }

    conv.innerHTML = `<div class="welcome">
      <h2>⚡ Evocation</h2>
      <div class="setup-form">
        <select id="modelSelect" style="background:var(--surface);border:1px solid var(--accent);color:var(--fg);padding:10px 14px;border-radius:6px;font-size:14px;outline:none">
          <optgroup label="🖥 Local (Ollama)">
            ${localOpts}
          </optgroup>
          <optgroup label="☁ Cloud (API key)">
            ${cloudOpts}
          </optgroup>
        </select>
        <div id="apiKeyGroup" style="display:none">
          <input type="password" id="apiKeyInput" placeholder="Enter your API key (sk-…)" style="background:var(--surface);border:1px solid var(--border);color:var(--fg);padding:10px 14px;border-radius:6px;font-size:14px;outline:none;width:100%" />
        </div>
        <button id="saveConfigBtn">Connect</button>
      </div>
      <div id="healthStatus"></div>
      <p style="margin-top:12px;font-size:11px;color:var(--muted)">✅ = installed  ⬇ = ollama pull  ☁ = needs API key  🔑 OpenRouter = one key, all models</p>
    </div>`;

    const sel = document.getElementById("modelSelect");
    const apiKeyGroup = document.getElementById("apiKeyGroup");
    const isCloud = (v) => cloudModels.some(m => m.name === v);
    sel.addEventListener("change", () => {
      apiKeyGroup.style.display = isCloud(sel.value) ? "block" : "none";
    });

    document.getElementById("saveConfigBtn").addEventListener("click", () => {
      const m = sel.value;
      const k = isCloud(m) ? (document.getElementById("apiKeyInput")?.value?.trim() || "") : "";
      if (isCloud(m) && !k) {
        showSetupError("API key required for cloud models.");
        return;
      }
      vscode.postMessage({ type: "setConfig", apiKey: k, model: m });
      const btn = document.getElementById("saveConfigBtn");
      btn.textContent = "Connecting…"; btn.disabled = true;
    });
  }
  function showHealth(h){const el=document.getElementById("healthStatus");if(!el)return;const ic=s=>s==="ok"?"✅":s==="missing"?"⚠":"❌";const lb=s=>s==="ok"?"Connected":s==="missing"?"Not set":s==="unavailable"?"Unavailable":s==="rejected"?"Rejected":"Unknown";el.innerHTML='<div class="health-check">'+['api_key','database','embedding'].map(k=>`<div>${ic(h[k])} ${k==="api_key"?"API Key":k==="database"?"Database":"Embeddings"}: ${lb(h[k])}</div>`).join("")+'</div>';}
  function showSetupError(msg){const el=document.getElementById("healthStatus");if(el)el.innerHTML='<div class="health-check" style="color:#f44747;">❌ '+esc(msg)+'</div>';const btn=document.getElementById("saveConfigBtn");if(btn){btn.textContent="Retry";btn.disabled=false;}}

  vscode.postMessage({type:"ready"});
})();
</script>
</body>
</html>
