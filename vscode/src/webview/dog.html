<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MemoryDog Mascot</title>
<style>
  :root {
    --bg: #1e1e1e;
    --fg: #d4d4d4;
    --muted: #6a6a6a;
    --accent: #007acc;
    --success: #4ec9b0;
    --error: #f44747;
    --warn: #cca700;
    --surface: #252526;
    --border: #3e3e3e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px 8px;
    min-height: 100vh;
    user-select: none;
  }

  /* ── Sprite ── */
  .dog-canvas {
    width: 160px;
    height: 304px;
    background-color: var(--surface);
    background-size: 640px 608px;
    background-repeat: no-repeat;
    background-position: 0 0;
    image-rendering: auto;
    flex-shrink: 0;
  }

  /* Per-state animation overlays — applied to the scene container */
  .state-idle .dog-canvas     { animation: breathe 3s ease-in-out infinite; }
  .state-thinking .dog-canvas { animation: think 1.2s ease-in-out infinite alternate; }
  .state-sniffing .dog-canvas { animation: sniff 0.45s ease-in-out infinite alternate; }
  .state-running .dog-canvas  { animation: runBounce 0.25s ease-in-out infinite alternate; }
  .state-success .dog-canvas  { animation: successPop 0.3s ease-in-out 2; }
  .state-error .dog-canvas    { animation: shake 0.3s ease-in-out 3; }
  .state-sleeping .dog-canvas { animation: sleepPulse 4s ease-in-out infinite; }
  .state-startup .dog-canvas  { animation: startupGrow 0.6s ease-out; }

  @keyframes breathe     { 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.03); } }
  @keyframes think       { 0%{ transform:rotate(-2deg); } 100%{ transform:rotate(2deg); } }
  @keyframes sniff       { 0%{ transform:translateX(-3px); } 100%{ transform:translateX(3px); } }
  @keyframes runBounce   { 0%{ transform:translateY(0); } 100%{ transform:translateY(-6px); } }
  @keyframes successPop  { 0%,100%{ transform:translateY(0) scale(1); } 50%{ transform:translateY(-10px) scale(1.05); } }
  @keyframes shake       { 0%,100%{ transform:translateX(0); } 25%{ transform:translateX(-3px); } 75%{ transform:translateX(3px); } }
  @keyframes sleepPulse  { 0%,100%{ transform:scale(0.95); opacity:0.7; } 50%{ transform:scale(1); opacity:0.85; } }
  @keyframes startupGrow { 0%{ transform:scale(0.8); opacity:0.3; } 60%{ transform:scale(1.04); opacity:1; } 100%{ transform:scale(1); opacity:1; } }

  /* ── State label ── */
  .state-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-top: 4px;
    padding: 1px 8px;
    border-radius: 8px;
    transition: color 0.3s;
  }
  .sl-idle     { color: var(--muted); }
  .sl-thinking { color: var(--accent); }
  .sl-sniffing { color: var(--warn); }
  .sl-running  { color: var(--accent); }
  .sl-success  { color: var(--success); }
  .sl-error    { color: var(--error); }
  .sl-sleeping { color: #555; }
  .sl-startup  { color: var(--accent); }

  /* ── Dashboard ── */
  .dashboard {
    width: 100%;
    margin-top: 6px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .dash-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 3px 6px;
    border-radius: 4px;
    font-size: 11px;
  }

  .dash-row .dash-key { color: var(--muted); flex-shrink: 0; }
  .dash-row .dash-val { color: var(--fg); font-weight: 500; text-align: right; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .dash-separator { height: 1px; background: var(--border); margin: 2px 0; }

  .dog-canvas.load-error {
    background-color: var(--surface);
    background-image: none !important;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
  }
</style>
</head>
<body>

<div class="scene" id="scene">
  <div class="dog-canvas" id="dogCanvas"></div>
</div>
<div class="state-label sl-sleeping" id="stateLabel">sleeping</div>

<div class="dashboard" id="dashboard">
  <div class="dash-separator"></div>
  <div class="dash-row"><span class="dash-key">Workspace</span><span class="dash-val" id="dashWorkspace">—</span></div>
  <div class="dash-row"><span class="dash-key">Memories</span><span class="dash-val" id="dashMemories">—</span></div>
  <div class="dash-row"><span class="dash-key">Instincts</span><span class="dash-val" id="dashInstincts">—</span></div>
  <div class="dash-separator"></div>
  <div class="dash-row"><span class="dash-key">Provider</span><span class="dash-val" id="dashProvider">—</span></div>
  <div class="dash-row"><span class="dash-key">Model</span><span class="dash-val" id="dashModel">—</span></div>
</div>

<script>
  const vscode = acquireVsCodeApi();

  // ═══════════════════════════════════════════════════
  // SpriteRenderer — CSS background-position clipping
  // ═══════════════════════════════════════════════════
  class SpriteRenderer {
    constructor(canvasEl) {
      this.el = canvasEl;
      this._config = null;
      this._currentState = "sleeping";

      // Image load error fallback
      this._img = new Image();
      this._img.addEventListener("error", () => {
        this.el.classList.add("load-error");
        console.error("MemoryDog: sprite sheet failed to load");
      });
      this._img.addEventListener("load", () => {
        this.el.classList.remove("load-error");
      });
    }

    configure(config) {
      this._config = config;
      const dw = 160;
      const fw = config.frameWidth || 531;
      const fh = config.frameHeight || 1008;
      const dh = Math.round((fh / fw) * dw);
      const cols = config.columns || 4;
      const rows = config.rows || 2;

      this._displayW = dw;
      this._displayH = dh;
      this.el.style.width = dw + "px";
      this.el.style.height = dh + "px";
      this.el.style.backgroundSize = (dw * cols) + "px " + (dh * rows) + "px";

      // Track load success/failure via a hidden Image element
      if (config.spriteUrl) {
        this._img.src = config.spriteUrl;
        this.el.style.backgroundImage = `url('${config.spriteUrl}')`;
      }

      // Immediately position to the current state (fixes: no frame on first load)
      this.setState(this._currentState);
    }

    setState(state) {
      this._currentState = state;
      const cfg = this._config;
      if (!cfg || !cfg.states) return;

      const frame = cfg.states[state] || cfg.states.idle || { col: 0, row: 0 };
      const x = -(frame.col * (this._displayW || 160));
      const y = -(frame.row * (this._displayH || 304));
      // Snap instantly — no transition to avoid sliding across intermediate frames
      this.el.style.backgroundPosition = x + "px " + y + "px";
    }

    get currentState() { return this._currentState; }
  }

  // ═══════════════════════════════════════════════════
  // DogStateMachine — valid transitions + one-shot logic
  // ═══════════════════════════════════════════════════
  const ONE_SHOT_STATES = new Set(["startup", "success", "error"]);

  class DogStateMachine {
    constructor(renderer, onStateChange) {
      this._renderer = renderer;
      this._onStateChange = onStateChange || (() => {});
      this._state = "sleeping";
      this._oneShotTimer = null;
      this._oneShotTarget = null;
      this._durations = {};
      this._inactivityTimer = null;
    }

    configure(durations) {
      this._durations = durations || {};
    }

    setState(state) {
      // Clear any pending one-shot return if re-entering the same one-shot state
      if (ONE_SHOT_STATES.has(state) && this._oneShotTimer) {
        clearTimeout(this._oneShotTimer);
        this._oneShotTimer = null;
      }

      // Skip if same state and no pending one-shot
      if (state === this._state && !this._oneShotTimer) return;

      this._state = state;
      this._renderer.setState(state);
      this._onStateChange(state);
      this._resetInactivity();

      if (ONE_SHOT_STATES.has(state)) {
        const duration = this._durations[state] || 700;
        this._oneShotTimer = setTimeout(() => {
          this._oneShotTimer = null;
          this.setState("idle");
        }, duration);
      }
    }

    tick(status) {
      if (status && Object.keys(status).length > 0) {
        this._resetInactivity();
      }
    }

    _resetInactivity() {
      if (this._inactivityTimer) clearTimeout(this._inactivityTimer);
      this._inactivityTimer = setTimeout(() => {
        if (this._state !== "sleeping" && !this._oneShotTimer) {
          this.setState("sleeping");
        }
      }, 60000);
    }

    get state() { return this._state; }
  }

  // ═══════════════════════════════════════════════════
  // DogWidget — orchestrator + dashboard
  // ═══════════════════════════════════════════════════
  class DogWidget {
    constructor() {
      this.canvas = document.getElementById("dogCanvas");
      this.label = document.getElementById("stateLabel");
      this.scene = document.getElementById("scene");

      this.dashWorkspace = document.getElementById("dashWorkspace");
      this.dashMemories = document.getElementById("dashMemories");
      this.dashInstincts = document.getElementById("dashInstincts");
      this.dashProvider = document.getElementById("dashProvider");
      this.dashModel = document.getElementById("dashModel");

      this._renderer = new SpriteRenderer(this.canvas);
      this._machine = new DogStateMachine(this._renderer, (s) => this._onState(s));
    }

    handleConfig(msg) {
      this._renderer.configure({
        spriteUrl: msg.spriteUrl,
        frameWidth: msg.frameWidth,
        frameHeight: msg.frameHeight,
        columns: msg.columns,
        rows: msg.rows,
        states: msg.states || {},
      });
      this._machine.configure(msg.durations || {});
    }

    handleTick(msg) {
      const state = msg.state || "idle";
      const status = msg.status || {};
      this._machine.setState(state);
      this._machine.tick(status);
      this._updateDashboard(status);
    }

    _updateDashboard(status) {
      this.dashWorkspace.textContent = status.workspace || "—";
      this.dashMemories.textContent = status.memory_count != null ? status.memory_count : "—";
      this.dashInstincts.textContent = status.instinct_count != null ? status.instinct_count : "—";
      this.dashProvider.textContent = status.provider || "—";
      this.dashModel.textContent = status.model || "—";
    }

    _onState(state) {
      this.scene.className = "scene state-" + state;
      this.label.textContent = state;
      this.label.className = "state-label sl-" + state;
    }
  }

  // ═══════════════════════════════════════════════════
  // Bootstrap
  // ═══════════════════════════════════════════════════
  const widget = new DogWidget();

  window.addEventListener("message", (event) => {
    const msg = event.data;
    switch (msg.type) {
      case "sprite_config":
        widget.handleConfig(msg);
        break;
      case "tick":
        widget.handleTick(msg);
        break;
      case "state":
        widget.handleTick({ state: msg.state, status: {} });
        break;
    }
  });

  vscode.postMessage({ type: "ready" });
</script>
</body>
</html>
