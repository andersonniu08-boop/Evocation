<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evocation — Goal Dashboard</title>
<style>
  :root {
    --bg: #1e1e1e; --fg: #d4d4d4; --accent: #007acc;
    --muted: #6a6a6a; --surface: #252526; --border: #3e3e3e;
    --success: #4ec9b0; --warn: #cca700; --error: #f44747;
    --caution: #e8ab3c;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:var(--bg); color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    font-size:13px; height:100vh; display:flex; flex-direction:column; overflow:hidden;
  }

  /* ═══ HEADER ═══ */
  .header {
    padding:14px 20px; background:var(--surface);
    border-bottom:1px solid var(--border); flex-shrink:0;
    display:flex; align-items:flex-start; gap:12px;
  }
  .state-indicator { width:32px; height:32px; flex-shrink:0; margin-top:2px; }
  .state-indicator .core { fill:var(--accent); }
  .state-indicator .ring { fill:none; stroke:var(--accent); stroke-width:2; opacity:0.3; }
  .state-indicator.executing .core { animation:spin 0.6s linear infinite; }
  .state-indicator.completed .core { fill:var(--success); }
  .state-indicator.failed .core { fill:var(--error); }
  .state-indicator.completed .ring { stroke:var(--success); }
  .state-indicator.failed .ring { stroke:var(--error); }
  @keyframes spin { 100%{transform:rotate(360deg); transform-origin:center; } }

  .header-info { flex:1; min-width:0; }
  .header-title-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .header-title { font-size:18px; font-weight:600; }
  .header-status {
    display:inline-block; padding:1px 8px; border-radius:3px;
    font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.3px;
  }
  .header-status.pending { background:rgba(255,255,255,0.04); color:var(--muted); }
  .header-status.in_progress { background:rgba(0,122,204,0.12); color:var(--accent); }
  .header-status.completed { background:rgba(78,201,176,0.12); color:var(--success); }
  .header-status.failed { background:rgba(244,71,71,0.12); color:var(--error); }
  .header-objective { font-size:12px; color:var(--muted); margin-top:4px; line-height:1.4; }

  /* Progress */
  .progress-section { margin-top:8px; }
  .progress-bar {
    height:5px; background:var(--border); border-radius:3px; overflow:hidden; position:relative;
  }
  .progress-fill {
    height:100%; border-radius:3px; transition:width 0.4s ease;
    background:linear-gradient(90deg, var(--accent), var(--success));
  }
  .progress-fill.complete { background:var(--success); }
  .progress-fill.error { background:var(--error); }
  .progress-stats { display:flex; gap:12px; margin-top:4px; font-size:10px; color:var(--muted); }
  .progress-stats span { display:flex; align-items:center; gap:3px; }
  .progress-stats .dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .dot.ok { background:var(--success); }
  .dot.warn { background:var(--warn); }
  .dot.err { background:var(--error); }
  .dot.info { background:var(--accent); }

  /* ═══ MAIN SPLIT ═══ */
  .main { flex:1; display:flex; overflow:hidden; }
  .tasks-panel { flex:1; overflow-y:auto; padding:16px 20px; min-width:0; }
  .activity-panel {
    width:280px; flex-shrink:0; overflow-y:auto;
    background:var(--surface); border-left:1px solid var(--border);
    display:flex; flex-direction:column;
  }
  .activity-header {
    padding:12px 16px 8px; flex-shrink:0;
    font-size:10px; font-weight:700; color:var(--muted);
    text-transform:uppercase; letter-spacing:0.8px;
  }
  .activity-feed { flex:1; overflow-y:auto; padding:0 16px 12px; }

  .panel-title {
    font-size:10px; font-weight:700; color:var(--muted);
    text-transform:uppercase; letter-spacing:0.8px; margin-bottom:10px;
  }

  /* ═══ TASK ITEM ═══ */
  .task-item {
    padding:10px 12px; border-radius:6px; border:1px solid var(--border);
    margin-bottom:6px; background:rgba(255,255,255,0.01);
    transition:background 0.1s;
  }
  .task-item:hover { background:rgba(255,255,255,0.02); }
  .task-item.completed { border-color:rgba(78,201,176,0.2); }
  .task-item.failed { border-color:rgba(244,71,71,0.2); }
  .task-item.in_progress { border-color:rgba(0,122,204,0.2); }

  .task-row { display:flex; align-items:flex-start; gap:10px; }
  .task-check {
    width:18px; height:18px; border-radius:4px; flex-shrink:0;
    border:2px solid var(--border); margin-top:1px;
    display:flex; align-items:center; justify-content:center;
    font-size:10px; font-weight:700; color:transparent; cursor:default;
  }
  .task-item.completed .task-check { background:var(--success); border-color:var(--success); color:var(--bg); }
  .task-item.in_progress .task-check { border-color:var(--accent); background:rgba(0,122,204,0.12); }
  .task-item.failed .task-check { border-color:var(--error); background:rgba(244,71,71,0.12); color:var(--error); }

  .task-body { flex:1; min-width:0; }
  .task-desc { line-height:1.45; }
  .task-desc.completed { text-decoration:line-through; opacity:0.5; }
  .task-meta { font-size:10px; color:var(--muted); margin-top:2px; }
  .task-notes { font-size:10px; color:var(--warn); margin-top:2px; font-style:italic; }

  /* Expander */
  .task-expander {
    margin-top:6px; font-size:10px; color:var(--accent); cursor:pointer;
    display:flex; align-items:center; gap:4px; user-select:none;
  }
  .task-expander:hover { color:var(--fg); }
  .task-expander .chevron {
    display:inline-block; transition:transform 0.15s; font-size:8px;
  }
  .task-expander.open .chevron { transform:rotate(90deg); }

  .task-findings {
    display:none; margin-top:6px; padding:8px 10px;
    background:rgba(255,255,255,0.02); border-radius:4px;
    border-left:2px solid var(--accent); font-size:11px;
    color:var(--muted); line-height:1.5; max-height:200px; overflow-y:auto;
    font-family:'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    white-space:pre-wrap; word-break:break-word;
  }
  .task-findings.show { display:block; }

  /* ═══ ACTIVITY FEED ═══ */
  .feed-item {
    padding:6px 0; border-bottom:1px solid rgba(255,255,255,0.02);
    font-size:11px; line-height:1.5; animation:fadeIn 0.2s;
  }
  @keyframes fadeIn { from {opacity:0; transform:translateY(-4px)} to {opacity:1; transform:translateY(0)} }
  .feed-time { color:var(--muted); font-size:9px; margin-top:1px; }
  .feed-item.status { color:var(--accent); }
  .feed-item.tool { color:var(--fg); }
  .feed-item.error { color:var(--error); }
  .feed-item.findings { color:var(--warn); }
  .feed-item.system { color:var(--muted); font-style:italic; }

  /* Approval prompt */
  .approval-card {
    margin:8px 16px; padding:10px; border-radius:6px;
    border:1px solid var(--caution); background:rgba(232,171,60,0.06);
    flex-shrink:0;
  }
  .approval-label {
    font-size:10px; font-weight:700; color:var(--caution);
    text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px;
  }
  .approval-tool { font-size:12px; font-weight:600; margin-bottom:2px; }
  .approval-params {
    font-size:10px; color:var(--muted); font-family:monospace;
    margin-bottom:2px; word-break:break-all;
  }
  .approval-reason { font-size:10px; color:var(--fg); font-style:italic; margin-bottom:6px; }
  .approval-actions { display:flex; gap:6px; }
  .approve-btn, .deny-btn {
    flex:1; padding:5px; border-radius:4px; border:none;
    font-size:11px; font-weight:600; cursor:pointer;
  }
  .approve-btn { background:var(--success); color:var(--bg); }
  .deny-btn { background:var(--error); color:white; }
  .approve-btn:hover { opacity:0.85; }
  .deny-btn:hover { opacity:0.85; }
  .approve-btn:disabled, .deny-btn:disabled { opacity:0.3; cursor:not-allowed; }

  /* Empty */
  .empty-state { color:var(--muted); text-align:center; padding:40px 20px; font-size:13px; }
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<div class="header">
  <svg class="state-indicator" id="stateIndicator" viewBox="0 0 32 32" width="32" height="32">
    <circle class="ring" cx="16" cy="16" r="14"/>
    <circle class="core" cx="16" cy="12" r="5"/>
  </svg>
  <div class="header-info">
    <div class="header-title-row">
      <span class="header-title" id="goalTitle">Loading...</span>
      <span class="header-status" id="goalStatus"></span>
    </div>
    <div class="header-objective" id="goalObjective"></div>
    <div class="progress-section">
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-stats">
        <span><span class="dot ok"></span> <span id="statCompleted">0</span> done</span>
        <span><span class="dot info"></span> <span id="statInProgress">0</span> active</span>
        <span><span class="dot err"></span> <span id="statFailed">0</span> failed</span>
        <span><span class="dot warn"></span> <span id="statPending">0</span> pending</span>
      </div>
    </div>
  </div>
</div>

<!-- ═══ MAIN SPLIT ═══ -->
<div class="main">
  <!-- Tasks Panel -->
  <div class="tasks-panel">
    <div class="panel-title">Task Plan</div>
    <div id="taskList"></div>
  </div>

  <!-- Activity Panel -->
  <div class="activity-panel">
    <div class="activity-header">Activity</div>
    <div id="approvalSlot"></div>
    <div class="activity-feed" id="activityFeed"></div>
  </div>
</div>

<script>
  const vscode = acquireVsCodeApi();
  let currentGoalId = null;

  function esc(s) { const d=document.createElement("div"); d.textContent=s||''; return d.innerHTML; }

  // ═══ HEADER ═══
  function renderHeader(goal) {
    document.getElementById("goalTitle").textContent = goal.title || "Untitled Goal";
    document.getElementById("goalObjective").textContent = goal.objective || "";
    const s = goal.status || "pending";
    const badge = document.getElementById("goalStatus");
    badge.textContent = s.replace(/_/g, " ");
    badge.className = "header-status " + s;

    const indicator = document.getElementById("stateIndicator");
    indicator.className = "state-indicator " + s;
  }

  function renderProgress(p) {
    if (!p) return;
    const pct = p.percentage || 0;
    const fill = document.getElementById("progressFill");
    fill.style.width = pct + "%";
    fill.className = "progress-fill" + (pct === 100 ? " complete" : p.failed > 0 && pct < 30 ? " error" : "");
    document.getElementById("statCompleted").textContent = p.completed || 0;
    document.getElementById("statInProgress").textContent = p.in_progress || 0;
    document.getElementById("statFailed").textContent = p.failed || 0;
    document.getElementById("statPending").textContent = (p.total || 0) - (p.completed || 0) - (p.failed || 0) - (p.in_progress || 0);
  }

  // ═══ TASK LIST ═══
  function renderTasks(tasks) {
    const list = document.getElementById("taskList");
    if (!tasks || tasks.length === 0) {
      list.innerHTML = '<div class="empty-state">No tasks yet. Use the Planner to generate a plan.</div>';
      return;
    }
    list.innerHTML = tasks.map((t, i) => {
      const s = t.status || "pending";
      const check = s === "completed" ? "✓" : s === "failed" ? "✗" : s === "in_progress" ? "●" : (t.order || i + 1);
      const descClass = s === "completed" ? "completed" : "";
      const findings = t.findings ? t.findings.trim() : "";
      const hasFindings = findings.length > 0;
      const meta = [];
      if (s === "in_progress" && t.started_at) meta.push("started " + new Date(t.started_at).toLocaleString());
      if (s === "completed" && t.completed_at) meta.push("done " + new Date(t.completed_at).toLocaleString());
      if (s === "failed" && t.completed_at) meta.push("failed " + new Date(t.completed_at).toLocaleString());

      return `
        <div class="task-item ${s}">
          <div class="task-row">
            <div class="task-check">${check}</div>
            <div class="task-body">
              <div class="task-desc ${descClass}">${esc(t.description || "")}</div>
              ${meta.length ? `<div class="task-meta">${meta.join(" · ")}</div>` : ""}
              ${t.notes ? `<div class="task-notes">Note: ${esc(t.notes)}</div>` : ""}
              ${hasFindings ? `
                <div class="task-expander" onclick="toggleFindings(this)" data-idx="${i}">
                  <span class="chevron">▶</span> Findings (${findings.length} chars)
                </div>
                <div class="task-findings" id="findings${i}">${esc(findings)}</div>
              ` : ""}
            </div>
          </div>
        </div>`;
    }).join('');
  }

  function toggleFindings(el) {
    el.classList.toggle("open");
    const idx = el.getAttribute("data-idx");
    document.getElementById("findings" + idx).classList.toggle("show");
  }

  // ═══ ACTIVITY FEED ═══
  function addActivity(type, text) {
    const feed = document.getElementById("activityFeed");
    const el = document.createElement("div");
    el.className = "feed-item " + (type || "system");
    const now = new Date().toLocaleTimeString();
    el.innerHTML = `<div>${esc(text)}</div><div class="feed-time">${now}</div>`;
    feed.insertBefore(el, feed.firstChild);
    // Trim old entries
    while (feed.children.length > 100) feed.lastChild.remove();
  }

  function renderActivity(items) {
    const feed = document.getElementById("activityFeed");
    if (!items || items.length === 0) {
      feed.innerHTML = '<div class="empty-state" style="padding:16px">No activity yet.</div>';
      return;
    }
    feed.innerHTML = items.slice(0, 80).map(a => `
      <div class="feed-item ${a.type || 'system'}">
        <div>${esc(a.text)}</div>
        <div class="feed-time">${esc(a.time || '')}</div>
      </div>`).join('');
  }

  // ═══ APPROVAL PROMPT ═══
  function showApproval(data) {
    const slot = document.getElementById("approvalSlot");
    slot.innerHTML = `
      <div class="approval-card" id="approvalCard">
        <div class="approval-label">⚠ Tool Needs Approval</div>
        <div class="approval-tool">${esc(data.tool || "unknown")}</div>
        <div class="approval-params">${esc((data.params || "").slice(0, 200))}</div>
        <div class="approval-reason">${esc(data.reasoning || "")}</div>
        <div class="approval-actions">
          <button class="approve-btn" id="approveBtn" onclick="handleApproval(true)">✓ Approve</button>
          <button class="deny-btn" id="denyBtn" onclick="handleApproval(false)">✗ Deny</button>
        </div>
      </div>`;
  }

  function handleApproval(approved) {
    const approveBtn = document.getElementById("approveBtn");
    const denyBtn = document.getElementById("denyBtn");
    if (approveBtn) approveBtn.disabled = true;
    if (denyBtn) denyBtn.disabled = true;
    vscode.postMessage({ type: approved ? "approveTool" : "denyTool" });
    setTimeout(() => {
      const slot = document.getElementById("approvalSlot");
      slot.innerHTML = "";
      addActivity("system", approved ? "Tool approved." : "Tool denied.");
    }, 300);
  }

  // ═══ MESSAGE ROUTER ═══
  window.addEventListener("message", e => {
    const msg = e.data;
    switch (msg.type) {
      case "goal":
        currentGoalId = msg.goal?.id;
        if (msg.goal) renderHeader(msg.goal);
        if (msg.progress) renderProgress(msg.progress);
        if (msg.tasks) renderTasks(msg.tasks);
        break;
      case "tasks":
        renderTasks(msg.tasks);
        break;
      case "progress":
        renderProgress(msg);
        break;
      case "activity":
        renderActivity(msg.items);
        break;
      case "status":
        addActivity("status", msg.text);
        break;
      case "approval_required":
        showApproval(msg);
        break;
      case "token":
        break;
    }
  });

  vscode.postMessage({ type: "ready" });
</script>
</body>
</html>
