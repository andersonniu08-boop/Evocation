<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evocation — Goal Dashboard</title>
<style>
  :root {
    --bg: #1e1e1e; --fg: #d4d4d4; --accent: #007acc;
    --muted: #6a6a6a; --surface: #252526; --border: #3e3e3e;
    --success: #4ec9b0; --warn: #cca700; --error: #f44747;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:var(--bg); color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    font-size:13px; height:100vh; display:flex; flex-direction:column;
    overflow:hidden;
  }

  /* Header */
  .header {
    padding:16px 20px; background:var(--surface);
    border-bottom:1px solid var(--border); flex-shrink:0;
    display:flex; align-items:center; gap:12px;
  }
  .state-indicator {
    width:28px; height:28px; flex-shrink:0;
  }
  .state-indicator .core { fill:var(--accent); }
  .state-indicator .ring { fill:none; stroke:var(--accent); stroke-width:2; opacity:0.4; }
  .state-indicator.executing .core { animation:spin 0.5s linear infinite; }
  @keyframes spin { 100%{transform:rotate(360deg); transform-origin:center; } }

  .header-info { flex:1; }
  .header-title { font-size:16px; font-weight:600; }
  .header-objective { font-size:12px; color:var(--muted); margin-top:2px; }
  .header-status { display:inline-block; padding:2px 10px; border-radius:4px; font-size:11px; font-weight:600; margin-left:8px; }
  .header-status.pending { background:rgba(255,255,255,0.05); color:var(--muted); }
  .header-status.in_progress { background:rgba(0,122,204,0.15); color:var(--accent); }
  .header-status.completed { background:rgba(78,201,176,0.15); color:var(--success); }
  .header-status.failed { background:rgba(244,71,71,0.15); color:var(--error); }

  .progress-wrapper { margin-top:6px; }
  .progress-bar { height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--accent); border-radius:2px; transition:width 0.3s; }
  .progress-text { font-size:10px; color:var(--muted); margin-top:2px; }

  /* Split pane */
  .main { flex:1; display:flex; overflow:hidden; }
  .tasks-panel {
    width:1fr; flex:1; overflow-y:auto; padding:16px 20px;
    border-right:1px solid var(--border);
  }
  .activity-panel {
    width:300px; flex-shrink:0; overflow-y:auto; padding:16px;
    background:var(--surface);
  }

  .panel-title {
    font-size:11px; font-weight:600; color:var(--muted);
    text-transform:uppercase; letter-spacing:0.5px;
    margin-bottom:12px;
  }

  /* Task list */
  .task-item {
    padding:10px; border-radius:6px; border:1px solid var(--border);
    margin-bottom:6px; display:flex; align-items:flex-start; gap:8px;
  }
  .task-item.completed { opacity:0.6; }
  .task-item.failed { border-color:var(--error); }
  .task-check {
    width:16px; height:16px; border-radius:4px; flex-shrink:0;
    border:2px solid var(--border); margin-top:2px;
    display:flex; align-items:center; justify-content:center;
    font-size:10px;
  }
  .task-item.completed .task-check { background:var(--success); border-color:var(--success); color:var(--bg); }
  .task-item.in_progress .task-check { border-color:var(--accent); background:rgba(0,122,204,0.15); }
  .task-item.failed .task-check { border-color:var(--error); background:rgba(244,71,71,0.15); }

  .task-body { flex:1; }
  .task-desc { line-height:1.4; }
  .task-findings {
    margin-top:4px; padding:6px 8px; background:rgba(255,255,255,0.03);
    border-radius:4px; font-size:11px; color:var(--muted);
    display:none;
  }
  .task-findings.show { display:block; }
  .task-notes { font-size:11px; color:var(--warn); margin-top:2px; }

  /* Activity feed */
  .feed-item {
    padding:6px 0; border-bottom:1px solid rgba(255,255,255,0.03);
    font-size:11px; line-height:1.5;
  }
  .feed-time { color:var(--muted); font-size:10px; }
  .feed-item.status { color:var(--accent); }
  .feed-item.tool { color:var(--success); }
  .feed-item.error { color:var(--error); }
  .feed-item.findings { color:var(--warn); }

  .empty-state { color:var(--muted); text-align:center; padding:40px 20px; font-size:13px; }
</style>
</head>
<body>

<div class="header">
  <svg class="state-indicator executing" viewBox="0 0 24 24" width="28" height="28">
    <circle class="ring" cx="12" cy="12" r="9"/>
    <circle class="core" cx="12" cy="12" r="5"/>
  </svg>
  <div class="header-info">
    <div>
      <span class="header-title" id="goalTitle">Loading...</span>
      <span class="header-status" id="goalStatus"></span>
    </div>
    <div class="header-objective" id="goalObjective"></div>
    <div class="progress-wrapper">
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-text" id="progressText">0/0 tasks</div>
    </div>
  </div>
</div>

<div class="main">
  <div class="tasks-panel">
    <div class="panel-title">Task Plan</div>
    <div id="taskList"></div>
  </div>
  <div class="activity-panel">
    <div class="panel-title">Activity</div>
    <div id="activityFeed"></div>
  </div>
</div>

<script>
  const vscode = acquireVsCodeApi();
  let currentGoalId = null;

  function esc(s) { const d=document.createElement("div"); d.textContent=s||''; return d.innerHTML; }

  function renderHeader(goal) {
    document.getElementById("goalTitle").textContent = goal.title || "Untitled Goal";
    document.getElementById("goalObjective").textContent = goal.objective || "";
    const s = goal.status || "pending";
    const badge = document.getElementById("goalStatus");
    badge.textContent = s.replace(/_/g, " ");
    badge.className = "header-status " + s;
    const indicator = document.querySelector(".state-indicator");
    indicator.className = "state-indicator " + (s === "in_progress" ? "executing" : "");
  }

  function renderProgress(p) {
    if (!p) return;
    const pct = p.percentage || 0;
    document.getElementById("progressFill").style.width = pct + "%";
    document.getElementById("progressText").textContent = `${p.completed || 0}/${p.total || 0} tasks · ${pct}%`;
  }

  function renderTasks(tasks) {
    const list = document.getElementById("taskList");
    if (!tasks || tasks.length === 0) {
      list.innerHTML = '<div class="empty-state">No tasks yet. Use the Planner to generate a plan.</div>';
      return;
    }
    list.innerHTML = tasks.map(t => {
      const s = t.status || "pending";
      const check = s === "completed" ? "✓" : s === "failed" ? "✗" : (t.order || "");
      const findings = t.findings ? `<div class="task-findings" onclick="this.classList.toggle('show')">${esc(t.findings.slice(0, 200))}</div>` : "";
      const notes = t.notes ? `<div class="task-notes">${esc(t.notes)}</div>` : "";
      return `
        <div class="task-item ${s}">
          <div class="task-check">${check}</div>
          <div class="task-body">
            <div class="task-desc">${esc(t.description || "")}</div>
            ${findings}${notes}
          </div>
        </div>`;
    }).join('');
  }

  function renderActivity(items) {
    const feed = document.getElementById("activityFeed");
    if (!items || items.length === 0) {
      feed.innerHTML = '<div class="empty-state" style="padding:20px">No activity yet.</div>';
      return;
    }
    feed.innerHTML = items.map(a => `
      <div class="feed-item ${a.type || 'status'}">
        <div>${esc(a.text)}</div>
        <div class="feed-time">${esc(a.time || '')}</div>
      </div>`).join('');
  }

  window.addEventListener("message", e => {
    const msg = e.data;
    switch (msg.type) {
      case "goal":
        currentGoalId = msg.goal?.id;
        if (msg.goal) renderHeader(msg.goal);
        if (msg.progress) renderProgress(msg.progress);
        if (msg.tasks) renderTasks(msg.tasks);
        break;
      case "tasks":
        renderTasks(msg.tasks);
        break;
      case "progress":
        renderProgress(msg);
        break;
      case "activity":
        renderActivity(msg.items);
        break;
      case "status":
        addActivity(msg.type, msg.text);
        break;
      case "token":
        break;
    }
  });

  function addActivity(type, text) {
    const feed = document.getElementById("activityFeed");
    const el = document.createElement("div");
    el.className = "feed-item " + type;
    el.innerHTML = `<div>${esc(text)}</div><div class="feed-time">${new Date().toLocaleTimeString()}</div>`;
    feed.insertBefore(el, feed.firstChild);
  }

  vscode.postMessage({ type: "ready" });
</script>
</body>
</html>
